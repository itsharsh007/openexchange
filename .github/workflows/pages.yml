# Build the React dashboard and deploy it to GitHub Pages.
#
# The gateway URL is injected at build time from repo Variables (Settings →
# Secrets and variables → Actions → Variables), NOT secrets — Vite bakes
# VITE_* values into the static bundle, so they are public by nature:
#   VITE_API_BASE = https://<name>.onrender.com
#   VITE_WS_URL   = wss://<name>.onrender.com/ws
# VITE_BASE pins the project-site sub-path so asset URLs resolve under /openexchange/.
name: Pages

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build
        env:
          VITE_BASE: /openexchange/
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
