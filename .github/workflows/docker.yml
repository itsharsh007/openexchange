name: Docker

# Build and push images to GitHub Container Registry on every merge to main.
# Images are available at: ghcr.io/itsharsh007/openexchange-<service>
# Tags: sha-<short-sha>  (every push)  and  latest  (main only)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    strategy:
      fail-fast: false  # don't cancel all services if one fails
      matrix:
        include:
          # Engine: build context is repo root (Gradle reads proto/ for the shared contract).
          - service: engine
            context: .
            dockerfile: engine/Dockerfile
          # Gateway, risk, web: each service is its own self-contained context.
          - service: gateway
            context: ./gateway
            dockerfile: gateway/Dockerfile
          - service: risk
            context: ./risk
            dockerfile: risk/Dockerfile
          - service: web
            context: ./web
            dockerfile: web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/itsharsh007/openexchange-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scoped GHA cache — each service gets its own layer cache key.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
