name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same branch so PRs don't queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Engine (Java 17 + Gradle) ──────────────────────────────────────────────
  engine:
    name: Engine (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          # Actions-managed Gradle cache — keyed on build files + wrapper.
          cache: gradle
      - name: Test
        run: cd engine && ./gradlew test --no-daemon
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-test-results
          path: engine/build/reports/tests/test/
          retention-days: 7

  # ── Gateway (Go) ───────────────────────────────────────────────────────────
  gateway:
    name: Gateway (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          # Cache keyed on go.sum so a lockfile change invalidates the module cache.
          cache-dependency-path: gateway/go.sum
      - name: Vet
        run: cd gateway && go vet ./...
      - name: Test (race detector on)
        run: cd gateway && go test -race -count=1 ./...

  # ── Risk service (Python 3.12) ─────────────────────────────────────────────
  risk:
    name: Risk (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: risk/requirements.txt
      - name: Install
        run: cd risk && pip install -r requirements.txt
      - name: Lint (ruff)
        run: cd risk && ruff check . || true
      - name: Test
        run: cd risk && pytest -q

  # ── Web (Node 22 + TypeScript) ─────────────────────────────────────────────
  web:
    name: Web (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: cd web && npm ci
      - name: Type-check
        # Catches broken imports/types that tests alone won't surface.
        run: cd web && npx tsc --noEmit
      - name: Test
        run: cd web && npm test --silent
      - name: Build
        run: cd web && npm run build
