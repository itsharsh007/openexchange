name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - run: cd engine && ./gradlew test
        if: ${{ hashFiles('engine/build.gradle*') != '' }}

  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - run: cd gateway && go test ./...
        if: ${{ hashFiles('gateway/go.mod') != '' }}

  risk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: cd risk && pip install -r requirements.txt && pytest -q
        if: ${{ hashFiles('risk/requirements.txt') != '' }}

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: cd web && npm ci && npm test --silent
        if: ${{ hashFiles('web/package.json') != '' }}
