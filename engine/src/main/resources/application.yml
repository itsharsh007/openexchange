# Twelve-Factor config: every value is overridable by an environment variable with a sane local
# default, so the same build runs unchanged in dev, docker-compose, and prod.
spring:
  application:
    name: engine
  datasource:
    # Twelve-Factor: connection comes entirely from the environment. Defaults target the local
    # Postgres (native or docker-compose) with the oex/oex/openexchange credentials.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/openexchange}
    username: ${DB_USER:oex}
    password: ${DB_PASSWORD:oex}
  flyway:
    # Versioned, idempotent schema migrations run automatically on startup.
    enabled: true
    locations: classpath:db/migration
  kafka:
    # Producer connects lazily on first send, so the engine boots fine without a broker.
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      # acks=all + idempotent producer: no duplicate or lost records on retry to the broker.
      acks: all
      properties:
        enable.idempotence: true

# HTTP port — serves only the actuator health endpoint (the order API is gRPC, below).
server:
  port: ${HTTP_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

engine:
  grpc:
    port: ${GRPC_PORT:50051}
  book:
    # Default order-book depth returned by GetBook when the request asks for 0 levels.
    default-depth: ${BOOK_DEFAULT_DEPTH:10}
  kafka:
    # Topic the engine publishes executed trades to (consumed by the gateway tape + risk service).
    trades-topic: ${TRADES_TOPIC:trades}
