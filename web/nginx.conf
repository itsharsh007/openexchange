# nginx serves the static Vite bundle AND reverse-proxies the API + WebSocket to
# the Go gateway, so the browser talks to a single origin (the web container).
#
# WHY same-origin: the bundle is built with relative URLs (VITE_API_BASE="",
# VITE_WS_URL="/ws"), so REST and WS calls land here and we forward them to the
# gateway over the compose network. No CORS, no per-environment API host baked in.
# (For static hosts that can't proxy — e.g. GitHub Pages — the bundle is instead
# built with absolute VITE_API_BASE/VITE_WS_URL pointing at the public gateway.)

upstream gateway {
  server gateway:8080;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── API: forward the gateway's REST surface ────────────────────────────────
  # Prefix matches cover sub-paths too: /orders/{id}, /book/{symbol}, /auth/demo.
  location /auth/    { proxy_pass http://gateway; }
  location /orders   { proxy_pass http://gateway; }
  location /book/    { proxy_pass http://gateway; }
  location /healthz  { proxy_pass http://gateway; }
  location /metrics  { proxy_pass http://gateway; }

  # ── WebSocket: live book/trades/risk feed needs the HTTP upgrade dance ──────
  location /ws {
    proxy_pass http://gateway;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400s; # keep idle sockets open (no chatty pings needed)
  }

  # Long-cache fingerprinted assets (Vite emits hashed filenames).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback: any unknown path serves index.html so the React app can route.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
