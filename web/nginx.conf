server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: any unknown path serves index.html so the React app can route.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache fingerprinted assets (Vite emits hashed filenames).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
